name: Build&Push Release Docker Image

on:
  push:
    branches:
      - main
    tags:
      - '*'

  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  send-tg-msg:
    name: Send TG message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Send Telegram message
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          status: info
          notify_fields: 'repository,branch,commit,workflow'
          title: 'Build started.'

  build-docker-images:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Skipping Docker Hub login because credentials are not configured."
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build metadata
        id: meta
        env:
          DOCKERHUB_BACKEND_IMAGE: ${{ vars.DOCKERHUB_BACKEND_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          FRONTEND_REPOSITORY: ${{ vars.FRONTEND_REPOSITORY }}
        run: |
          FRONTEND_REPOSITORY="${FRONTEND_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/rw-frontend}"
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY}"
          IMAGE_NAMES="$GHCR_IMAGE"

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            FRONTEND_URL="https://github.com/${FRONTEND_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/remnawave-frontend.zip"
          else
            FRONTEND_URL="https://github.com/${FRONTEND_REPOSITORY}/releases/latest/download/remnawave-frontend.zip"
          fi

          if [ -n "$DOCKERHUB_BACKEND_IMAGE" ] && [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            IMAGE_NAMES="${IMAGE_NAMES},${DOCKERHUB_BACKEND_IMAGE}"
          fi

          echo "image_names=${IMAGE_NAMES}" >> "$GITHUB_OUTPUT"
          echo "frontend_url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "frontend_commit=$(curl -s https://api.github.com/repos/${FRONTEND_REPOSITORY}/commits/${{ github.ref_name }} | jq -r '.sha // \"unknown\"')" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            FRONTEND_URL=${{ steps.meta.outputs.frontend_url }}
            __RW_METADATA_GIT_BRANCH=${{ github.ref_name }}
            __RW_METADATA_BUILD_TIME=${{ steps.meta.outputs.build_time }}
            __RW_METADATA_BUILD_NUMBER=${{ github.run_number }}
            __RW_METADATA_VERSION=${{ steps.meta.outputs.version }}
            __RW_METADATA_GIT_BACKEND_COMMIT=${{ github.sha }}
            __RW_METADATA_GIT_FRONTEND_COMMIT=${{ steps.meta.outputs.frontend_commit }}
          outputs: |
            type=image,"name=${{ steps.meta.outputs.image_names }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & push manifests
    needs: [build-docker-images]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Skipping Docker Hub login because credentials are not configured."
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest lists
        env:
          DOCKERHUB_BACKEND_IMAGE: ${{ vars.DOCKERHUB_BACKEND_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY}"

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            GHCR_TAGS=(-t "${GHCR_IMAGE}:latest" -t "${GHCR_IMAGE}:${GITHUB_REF_NAME}")
            if [[ "$GITHUB_REF_NAME" == 2.* ]]; then
              GHCR_TAGS+=(-t "${GHCR_IMAGE}:2")
            fi
          else
            GHCR_TAGS=(-t "${GHCR_IMAGE}:main")
          fi

          docker buildx imagetools create "${GHCR_TAGS[@]}" \
            $(printf "${GHCR_IMAGE}@sha256:%s " *)

          if [ -n "$DOCKERHUB_BACKEND_IMAGE" ] && [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              DOCKERHUB_TAGS=(-t "${DOCKERHUB_BACKEND_IMAGE}:latest" -t "${DOCKERHUB_BACKEND_IMAGE}:${GITHUB_REF_NAME}")
              if [[ "$GITHUB_REF_NAME" == 2.* ]]; then
                DOCKERHUB_TAGS+=(-t "${DOCKERHUB_BACKEND_IMAGE}:2")
              fi
            else
              DOCKERHUB_TAGS=(-t "${DOCKERHUB_BACKEND_IMAGE}:main")
            fi

            docker buildx imagetools create "${DOCKERHUB_TAGS[@]}" \
              $(printf "${DOCKERHUB_BACKEND_IMAGE}@sha256:%s " *)
          fi

      - name: Inspect image
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_REF_NAME}"
          else
            docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:main"
          fi

  create-release:
    needs: [merge]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: NewTag
        id: tag
        uses: JinoArch/get-latest-tag@latest

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(npx changelogen --from=${{ steps.tag.outputs.previousTag }} --to=${{ steps.tag.outputs.latestTag }} | sed '/^\[log\]/d')
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          echo "$CHANGELOG" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          make_latest: true
          draft: false
          prerelease: false
          body: |
            Remnawave Backend v${{ github.ref_name }}

            Latest Docker image:
            - `ghcr.io/${{ github.repository }}:latest`

            Docker images:
            - `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            ${{ env.CHANGELOG }}

  send-finish-tg-msg:
    name: Send TG message
    needs: [merge]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Send Telegram message
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          status: ${{ job.status }}
          notify_fields: 'repository,branch,commit'
          title: 'Build finished.'

  notify-on-error:
    runs-on: ubuntu-latest
    needs: [build-docker-images, merge, create-release]
    if: failure()
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Send error notification
        uses: proDreams/actions-telegram-notifier@main
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          status: failure
          notify_fields: 'repository,branch,commit,workflow'
          title: 'Build failed.'
